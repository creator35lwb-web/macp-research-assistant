# SonarCloud / SonarQube Cloud — project configuration
# Dashboard: https://sonarcloud.io/project/overview?id=creator35lwb-web_macp-research-assistant
#
# IMPORTANT: CI-based analysis (the sonarcloud.yml workflow) and SonarCloud
# "Automatic Analysis" are mutually exclusive. To use this CI workflow you MUST
# turn OFF Automatic Analysis in the SonarCloud project:
#   Project → Administration → Analysis Method → disable "Automatic Analysis".
# Otherwise SonarCloud rejects the CI run with an "Automatic Analysis is enabled" error.

sonar.projectKey=creator35lwb-web_macp-research-assistant
sonar.organization=creator35lwb-web

# Analyzed source code
sonar.sources=phase3_prototype/backend,tools,phase3_prototype/frontend/src

# Test files (kept separate so issues in tests don't count against product code)
sonar.tests=.
sonar.test.inclusions=**/test_*.py,**/*.test.ts,**/*.test.tsx

# Exclude dependencies, build output, data, and generated assets
sonar.exclusions=**/node_modules/**,**/dist/**,**/__pycache__/**,.macp/**,**/*.min.js,phase3_prototype/frontend/public/**

sonar.python.version=3.11,3.12
sonar.sourceEncoding=UTF-8

# Fail the CI job if the Quality Gate fails (this is the "CI-gated" enforcement).
sonar.qualitygate.wait=true
